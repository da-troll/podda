<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Podda — Get the App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0f1117;
      color: #e8e8ed;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 24px;
    }
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .logo {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      margin: 0 auto 20px;
      display: block;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 6px; }
    .version { font-size: 0.9rem; color: rgba(255,255,255,0.45); margin-bottom: 20px; }
    .changelog {
      font-size: 0.875rem;
      color: rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 24px;
      text-align: left;
      display: none;
    }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #6366f1;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      padding: 14px 28px;
      border-radius: 12px;
      text-decoration: none;
      width: 100%;
      justify-content: center;
    }
    .btn-primary:hover { background: #5558e3; }
    .btn-primary svg { width: 22px; height: 22px; }
    details {
      margin-top: 22px;
      text-align: left;
    }
    summary {
      cursor: pointer;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.45);
      padding: 6px 0;
      list-style: none;
      text-align: center;
    }
    summary::-webkit-details-marker { display: none; }
    summary:hover { color: rgba(255,255,255,0.7); }
    .fallback {
      margin-top: 14px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.55);
      line-height: 1.5;
    }
    .fallback a {
      color: #a5b4fc;
      text-decoration: none;
      display: inline-block;
      margin-top: 8px;
      font-weight: 500;
    }
    .fallback a:hover { text-decoration: underline; }
    .loading { color: rgba(255,255,255,0.4); font-size: 0.9rem; }
    .error { color: #f87171; font-size: 0.9rem; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <img src="/icon-1024.png" alt="Podda" class="logo" />
    <h1>Podda</h1>
    <div class="version" id="version">Loading…</div>
    <div class="changelog" id="changelog"></div>

    <a class="btn-primary" href="https://play.google.com/apps/internaltest/4701166612874787277">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3.609 1.814 13.792 12 3.61 22.186a.996.996 0 0 1-.61-.92V2.734a1 1 0 0 1 .609-.92zm10.89 10.893 2.302 2.302-10.937 6.333 8.635-8.635zm3.199-3.198 2.807 1.626a1 1 0 0 1 0 1.73l-2.808 1.626L15.206 12l2.492-2.491zM5.864 2.658 16.802 8.99l-2.302 2.302-8.636-8.634z"/></svg>
      Update
    </a>

    <details>
      <summary>Other install options</summary>
      <div class="fallback">
        Prefer to sideload? Having issues with the latest Play Store version? Download and install the APK directly.
        <p class="loading" id="apk-loading">Loading…</p>
        <p class="error" id="error">Couldn't fetch APK info.</p>
        <a id="apk-link" href="#" style="display:none; margin-top:12px; background:#6366f1; color:#fff; padding:10px 20px; border-radius:8px; font-weight:600; font-size:0.9rem; text-decoration:none;">Download Android APK</a>
      </div>
    </details>
  </div>

  <script>
    fetch('/podda-app-version.json', { cache: 'no-store' })
      .then(r => r.json())
      .then(info => {
        document.getElementById('version').textContent = 'Version ' + info.version;
        if (info.changelog) {
          const el = document.getElementById('changelog');
          el.textContent = info.changelog;
          el.style.display = 'block';
        }
        document.getElementById('apk-loading').style.display = 'none';
        const link = document.getElementById('apk-link');
        if (info.url && info.url.endsWith('.apk')) {
          link.href = info.url;
          link.style.display = 'inline-block';
        } else {
          document.getElementById('apk-loading').textContent = 'No sideload APK published for this version. Install via Play Store above.';
          document.getElementById('apk-loading').style.display = 'block';
        }
      })
      .catch(() => {
        document.getElementById('version').textContent = '';
        document.getElementById('apk-loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
      });
  </script>
</body>
</html>
